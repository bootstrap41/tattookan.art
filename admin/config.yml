backend:
  name: github
  repo: bootstrap41/tattookan.art
  branch: main
  base_url: https://tattookan-decap-auth.tattookan-art.workers.dev

locale: "tr"

media_folder: "assets/images/uploads"
public_folder: "assets/images/uploads"

collections:
  - name: "modeller"
    label: "Modeller"
    files:
      - name: "modeller_dosyasi"
        label: "Modeller"
        file: "data/tattoos.json"
        fields:
          - label: "Çalışmalar"
            name: "models"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}}"
            fields:
              - { label: "ID (benzersiz numara)", name: "id", widget: "number", hint: "Her çalışma için farklı bir sayı olmalı, örn. 69, 70, 71..." }
              - { label: "Başlık", name: "title", widget: "string" }
              - label: "Kategori"
                name: "category"
                widget: "select"
                options:
                  - { label: "Dark Realism", value: "dark-realism" }
                  - { label: "Fine Line", value: "fine-line" }
                  - { label: "Minimal", value: "minimal" }
                  - { label: "Cover Up", value: "cover-up" }
                  - { label: "Mandala", value: "mandala" }
              - { label: "Görsel", name: "image", widget: "image" }
              - { label: "Fiyat (₺)", name: "basePrice", widget: "number", value_type: "int" }
              - { label: "İndirim Oranı (%)", name: "discount", widget: "number", value_type: "int", default: 0, required: false }
              - { label: "Puan (1-5)", name: "rating", widget: "number", value_type: "float", default: 5 }
              - { label: "Yorum Sayısı", name: "reviews", widget: "number", value_type: "int", default: 0 }
              - { label: "Açıklama", name: "description", widget: "text" }

  - name: "portfolyo"
    label: "Portfolyo"
    files:
      - name: "portfolyo_dosyasi"
        label: "Portfolyo"
        file: "data/portfolyo.json"
        fields:
          - label: "Çalışmalar"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "İsim", name: "name", widget: "string" }
              - label: "Görseller (farklı açılar eklenebilir)"
                name: "images"
                widget: "list"
                field: { label: "Görsel", name: "image", widget: "image" }
                hint: "İlk eklediğin görsel kapak fotoğrafı olarak kullanılır, diğerleri galeri içinde gösterilir."
              - { label: "Açıklama", name: "description", widget: "text", required: false }

  - name: "sss"
    label: "Sık Sorulan Sorular"
    files:
      - name: "sss_dosyasi"
        label: "SSS"
        file: "data/faq.json"
        fields:
          - label: "Sorular"
            name: "items"
            widget: "list"
            summary: "{{fields.question}}"
            fields:
              - { label: "Soru", name: "question", widget: "string" }
              - { label: "Cevap", name: "answer", widget: "text" }

  - name: "yorumlar"
    label: "Müşteri Yorumları"
    files:
      - name: "yorumlar_dosyasi"
        label: "Yorumlar"
        file: "data/yorumlar.json"
        fields:
          - label: "Yorumlar"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "İsim Soyisim", name: "name", widget: "string" }
              - { label: "Yorum Metni", name: "text", widget: "text" }
              - { label: "Öne Çıkan Yorum mu? (ortada büyük gösterilir)", name: "featured", widget: "boolean", default: false }

  - name: "ayarlar"
    label: "Genel Site Ayarları"
    files:
      - name: "ayarlar_dosyasi"
        label: "Genel Ayarlar"
        file: "data/settings.json"
        fields:
          - { label: "WhatsApp Numarası (başında 90 ile, boşluksuz)", name: "whatsappNumber", widget: "string", hint: "Örn. 905388746412" }
          - { label: "Çalışma Saatleri (yazı olarak)", name: "workingHoursText", widget: "string", hint: "Örn. 10:00 - 23:00" }
          - label: "Kampanya İndirim Oranları (%)"
            name: "campaignRates"
            widget: "object"
            fields:
              - { label: "Dark Realism", name: "dark-realism", widget: "number", value_type: "int" }
              - { label: "Fine Line", name: "fine-line", widget: "number", value_type: "int" }
              - { label: "Minimal", name: "minimal", widget: "number", value_type: "int" }
              - { label: "Cover Up", name: "cover-up", widget: "number", value_type: "int" }
              - { label: "Mandala", name: "mandala", widget: "number", value_type: "int" }
          - label: "Google Puanı (arama sonuçlarındaki yıldız için)"
            name: "googleRating"
            widget: "object"
            hint: "Google İşletme Profili'ndeki gerçek puan/yorum sayısı değiştiğinde burayı güncelle."
            fields:
              - { label: "Puan (örn. 5.0)", name: "ratingValue", widget: "string" }
              - { label: "Toplam Yorum Sayısı", name: "reviewCount", widget: "string" }

  - name: "hediyeCekleri"
    label: "Hediye Çeki Tutarları"
    files:
      - name: "hediye_dosyasi"
        label: "Hediye Çekleri"
        file: "data/hediye-tutarlari.json"
        fields:
          - label: "Tutarlar"
            name: "items"
            widget: "list"
            summary: "{{fields.amount}} ₺"
            fields:
              - { label: "Tutar (₺)", name: "amount", widget: "number", value_type: "int" }
              - { label: "Açıklama", name: "note", widget: "string" }
